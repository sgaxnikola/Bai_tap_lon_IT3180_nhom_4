<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bluemoon Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{layout/sidebar :: sidebar}"></div>

<div class="main-content">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="content">
        <h1>Dashboard</h1>
        <p>Hệ thống quản lý chung cư Bluemoon</p>

        <div class="cards">
            <div class="card">
                <h3>Tổng số hộ</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Tổng nhân khẩu</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Đã thu</h3>
                <p>0 VNĐ</p>
            </div>

            <div class="card">
                <h3>Chưa thu</h3>
                <p>0 VNĐ</p>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>

</body>
</html>
